{% extends 'base.html' %}

{% block title %}Password Reset Complete - SmartCare System{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] bg-[#F8FAFC] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden text-center">
            <div class="p-8 sm:p-12">
                <div class="mb-10">
                    <div class="inline-flex items-center justify-center mb-6">
                        <div class="w-16 h-16 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-[1.25rem] flex items-center justify-center shadow-xl shadow-emerald-500/20">
                            <i class="fas fa-check-circle text-white text-3xl"></i>
                        </div>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-2">Password Reset!</h1>
                    <p class="text-slate-500 font-medium">Your password has been successfully reset. You may now log in with your new password.</p>
                </div>

                <div class="mt-10 pt-8 border-t border-slate-100">
                    <a href="{% url 'accounts:login' %}" class="inline-flex items-center justify-center py-4 px-10 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all duration-300 font-black text-base active:scale-[0.98]">
                        Sign In Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
