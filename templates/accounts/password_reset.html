{% extends 'base.html' %}

{% block title %}Reset Password - SmartCare System{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] bg-[#F8FAFC] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden">
            <div class="p-8 sm:p-12">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center mb-6">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[1.25rem] flex items-center justify-center shadow-xl shadow-blue-500/20">
                            <i class="fas fa-key text-white text-3xl"></i>
                        </div>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-2">Forgot Password?</h1>
                    <p class="text-slate-500 font-medium">Enter your email and we'll send you a link to reset your password.</p>
                </div>

                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    <div class="space-y-1.5">
                        <label for="id_email" class="block text-slate-700 text-sm font-bold ml-1">Email Address</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                <i class="fas fa-envelope text-sm"></i>
                            </div>
                            <input type="email" name="email" id="id_email" required
                                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white transition-all text-slate-900 placeholder:text-slate-400 font-medium"
                                   placeholder="name@gmail.com">
                        </div>
                    </div>

                    <button type="submit" class="w-full py-4 px-6 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all duration-300 font-black text-base active:scale-[0.98]">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <a href="{% url 'accounts:login' %}" class="text-slate-500 hover:text-blue-600 font-bold text-sm transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left text-xs"></i>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
