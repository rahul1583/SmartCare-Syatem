{% extends 'base.html' %}
{% load static %}

{% block title %}Success - SmartCare System{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-10 text-center">
            <!-- Icon -->
            <div class="inline-flex items-center justify-center w-20 h-20 bg-green-50 rounded-full mb-6 text-green-600">
                <i class="fas fa-check text-3xl"></i>
            </div>

            <!-- Text -->
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Password Updated</h2>
            <p class="text-gray-600 text-sm leading-relaxed mb-8">
                Your password has been changed successfully. You can now use your new credentials to sign in next time.
            </p>

            <!-- Action -->
            <a href="{% url 'accounts:dashboard' %}" 
               class="w-full flex items-center justify-center py-3.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition-colors shadow-sm active:scale-[0.98]">
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
